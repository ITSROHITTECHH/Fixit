<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - FixIt</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

  <style>
    
    /* HAMBURGER MENU STYLES */
    
    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: space-between;
      width: 42px;
      height: 42px;
      cursor: pointer;
      background: #ff5722;
      border: none;
      border-radius: 8px;
      padding: 10px 9px;
      z-index: 1001;
      box-shadow: 0 2px 8px rgba(255, 87, 34, 0.5);
    }

    .hamburger span {
      display: block;
      width: 100%;
      height: 3px;
      background-color: #ffffff;
      border-radius: 3px;
      transition: all 0.3s ease;
    }

    /* Hamburger → X animation */
    .hamburger.active span:nth-child(1) {
      transform: translateY(9.5px) rotate(45deg);
    }
    .hamburger.active span:nth-child(2) {
      opacity: 0;
      transform: scaleX(0);
    }
    .hamburger.active span:nth-child(3) {
      transform: translateY(-9.5px) rotate(-45deg);
    }

    /* Mobile overlay backdrop */
    .nav-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 999;
    }
    .nav-overlay.active {
      display: block;
    }

    
    /* MOBILE RESPONSIVE     */
    
    @media (max-width: 768px) {

      .hamburger {
        display: flex;
      }

      header {
        display: flex !important;
        flex-direction: row !important;
        justify-content: space-between !important;
        align-items: center !important;
        padding: 15px 20px !important;
        position: relative;
        z-index: 1000;
      }

      /* Mobile nav drawer (slides from right) */
      header nav {
        display: flex !important;
        flex-direction: column !important;
        position: fixed !important;
        top: 0;
        right: -100%;
        width: 260px;
        height: 100vh;
        background: #111;
        padding: 80px 30px 30px;
        gap: 10px !important;
        z-index: 1000;
        transition: right 0.35s ease;
        box-shadow: -5px 0 20px rgba(0,0,0,0.4);
      }

      header nav.open {
        right: 0;
      }

      header nav a {
        display: block !important;
        padding: 12px 15px !important;
        color: #fff;
        font-size: 1.1rem;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        text-decoration: none;
        transition: color 0.2s ease, padding-left 0.2s ease;
      }

      header nav a:hover {
        color: #ff5722;
        padding-left: 22px !important;
      }
    }
  </style>
</head>
<body>

  <!-- Mobile nav overlay backdrop -->
  <div class="nav-overlay" id="navOverlay" onclick="closeMenu()"></div>

  <header>
    <h1 class="logo">FixIt</h1>

    <!-- Hamburger Button (mobile only) -->
    <button class="hamburger" id="hamburger" aria-label="Toggle menu" onclick="toggleMenu()">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav id="mainNav">
      <a href="index.html" onclick="closeMenu()">Home</a>
      <a href="services/service.html" onclick="closeMenu()">Services</a>
      <a href="about.html" onclick="closeMenu()">About Us</a>
      <a href="contact.html" onclick="closeMenu()">Contact</a>
      <a href="signup.html" onclick="closeMenu()">Signup</a>
    </nav>
  </header>

  <main>
    <section class="contact-section">
      <div class="contact-container">
        <h2>Contact Us</h2>
        <p>Have a question or want to book a service? Reach out to us using the form below or our contact details.</p>

        <div class="contact-grid">
          <!-- Contact Form -->
          <form id="contactForm" class="contact-form">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <input type="text" name="subject" placeholder="Subject" required>
            <textarea name="message" placeholder="Your Message" rows="6" required></textarea>
            <p id="backend-msg"></p>
            <button type="submit" class="btn" id="contactBtn">Send Message</button>
          </form>

          <!-- Contact Info -->
          <div class="contact-info">
            <h3>Get in Touch</h3>
            <p><i class="fas fa-envelope"></i> support@fixit.com</p>
            <p><i class="fas fa-phone"></i> +91 9000030001</p>
            <p><i class="fas fa-map-marker-alt"></i> 123 FixIt Street, City, Country</p>
            
            <h3>Our Location</h3>
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d241317.11624291588!2d72.74109935129257!3d19.08219783960148!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3be7b63c2e2f0c1f%3A0x5f0e7e8db9f7bb4!2sMumbai%2C%20Maharashtra%2C%20India!5e0!3m2!1sen!2sus!4v1701411367101!5m2!1sen!2sus" width="100%" height="250" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 FixIt. All rights reserved.</p>
  </footer>

  <!-- Hamburger Menu Script (same as index.html) -->
  <script>
    function toggleMenu() {
      const nav = document.getElementById('mainNav');
      const hamburger = document.getElementById('hamburger');
      const overlay = document.getElementById('navOverlay');

      nav.classList.toggle('open');
      hamburger.classList.toggle('active');
      overlay.classList.toggle('active');

      document.body.style.overflow = nav.classList.contains('open') ? 'hidden' : '';
    }

    function closeMenu() {
      const nav = document.getElementById('mainNav');
      const hamburger = document.getElementById('hamburger');
      const overlay = document.getElementById('navOverlay');

      nav.classList.remove('open');
      hamburger.classList.remove('active');
      overlay.classList.remove('active');
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeMenu();
    });
  </script>

  <!-- Contact Form Script -->
  <script>
    const form = document.querySelector(".contact-form");
    const btn = document.getElementById("contactBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      btn.disabled = true;
      btn.innerText = "Sending...";

      const formData = new FormData(form);

      const response = await fetch("https://fixit-r6j0.onrender.com/api/contact/", {
        method: "POST",
        body: formData,
      });

      const data = await response.json();

      if (response.ok) {
        btn.innerText = "Message Sent ✅";
        form.reset();
      } else {
        btn.innerText = "Try Again ❌";
      }

      setTimeout(() => {
        btn.innerText = "Send Message";
        btn.disabled = false;
      }, 3000);
    });
  </script>

  <script src="js/script.js"></script>

</body>
</html>
